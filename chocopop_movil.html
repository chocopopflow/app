<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChocoPop TV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;
  background:#0b0c12;
  color:#fff;
  font-family:Arial;
  overflow:hidden;
}
#app{
  display:flex;
  flex-direction:column;
  height:100vh;
}
/* HEADER */
#header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  flex-shrink:0;
}
.logo img{height:36px;object-fit:contain;display:block;}
.searchBtn{font-size:18px;cursor:pointer;}
#search{
  display:none;
  width:95%;
  margin:5px auto;
  padding:8px;
  border-radius:8px;
  border:1px solid #333;
  background:#000;
  color:#fff;
  flex-shrink:0;
}
/* PLAYER */
#playerWrap{
  width:100%;
  height:220px;
  background:#000;
  position:relative;
  flex-shrink:0;
}
#playerPlaceholder{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  z-index:20;
  pointer-events:none;
  transition:opacity 0.4s;
}
#playerPlaceholder img{
  width:48px;
  opacity:0.18;
  filter:grayscale(100%) brightness(2);
}
#playerPlaceholder.hidden{
  opacity:0;
  pointer-events:none;
}
video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  background:#000;
  position:absolute;
  top:0;left:0;
  z-index:1;
}
/* OVERLAY CONTROLES sobre el video */
#controls{
  position:absolute;
  bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.85));
  padding:8px 10px;
  display:flex;
  align-items:center;
  gap:10px;
  z-index:4;
  opacity:0;
  transition:opacity 0.3s;
}
#playerWrap:hover #controls,
#playerWrap.showControls #controls{opacity:1;}
.ctrl-btn{
  background:none;
  border:none;
  color:#fff;
  font-size:18px;
  cursor:pointer;
  padding:2px 5px;
  flex-shrink:0;
}
.ctrl-slider{
  -webkit-appearance:none;
  height:3px;
  border-radius:2px;
  background:#555;
  outline:none;
  flex:1;
}
.ctrl-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;
  border-radius:50%;
  background:#ff6b00;
  cursor:pointer;
}
.ctrl-label{font-size:11px;color:#aaa;flex-shrink:0;}
/* CATEGORIAS */
.subcats{
  display:flex;
  gap:8px;
  padding:8px;
  overflow-x:auto;
  flex-shrink:0;
}
.subcats::-webkit-scrollbar{display:none;}
.subcat{
  background:#1a1b25;
  padding:6px 12px;
  border-radius:10px;
  color:#aaa;
  font-size:13px;
  cursor:pointer;
  white-space:nowrap;
  flex-shrink:0;
}
.subcat.active{background:#ff6b00;color:#fff;}
/* LISTA */
.list{overflow-y:auto;flex:1;}
.item{
  display:flex;
  align-items:center;
  padding:14px;
  border-bottom:1px solid #1a1b25;
  cursor:pointer;
}
.item.active{
  border-left:3px solid #ff6b00;
  background:#151621;
}
.num{width:40px;color:#888;font-size:13px;}
.logoCh{
  width:42px;height:42px;
  background:#222;
  border-radius:8px;
  margin-right:10px;
  object-fit:contain;
  flex-shrink:0;
}
.logoCh-placeholder{
  width:42px;height:42px;
  background:#222;
  border-radius:8px;
  margin-right:10px;
  flex-shrink:0;
}
.name{font-weight:bold;}
.status{font-size:12px;color:#aaa;}
</style>
</head>
<body>
<div id="app">

<div id="header">
  <div class="logo">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhU8gAc3oY5QF1A1BDJ-0980Yuzj8VCofwiAdrtNwNGqnFK-mxgBXsni4aGeOCpOgUUJUfIlaOM4Sg2IVEEw3zj55VCjE5oJ-AiIuvd_FPRUsLNmexX5ZJGeaWM8YDIjgoYuEmd6xFuj0VSv70pcsEl5oDv8-j_W5NJhdYha8gBA-E04RpiZMkSa-OiXXo/s582/ChocoPop%20Logo.png" alt="ChocoPop TV">
  </div>
  <div class="searchBtn" onclick="toggleSearch()">🔍</div>
</div>
<input id="search" placeholder="Buscar canal...">

<div id="playerWrap">
  <!-- Video SIN controls nativos -->
  <video id="video" autoplay playsinline poster="https://blogger.googleusercontent.com/img/a/AVvXsEhtIlhNUpwOaqeAakZPwh1DBMZjAAwSg_RWZx2ASOiNfDltWNOLKaseHViEyL_MuxpKo7EyOmIidOm6BPPX3BifnYuF_5UEuofmy9-I8ZKl6eC0kOim2MKXz9tgRDL5vtDMzqzlnW_1kaJ8tfkbbe4ehbg7umyUT1zhKZeMntTOjthIkV_iF0yr4ecFpOE"></video>
  <!-- Placeholder ENCIMA del video en el DOM -->
  <div id="playerPlaceholder">
    <img src="https://blogger.googleusercontent.com/img/a/AVvXsEhtIlhNUpwOaqeAakZPwh1DBMZjAAwSg_RWZx2ASOiNfDltWNOLKaseHViEyL_MuxpKo7EyOmIidOm6BPPX3BifnYuF_5UEuofmy9-I8ZKl6eC0kOim2MKXz9tgRDL5vtDMzqzlnW_1kaJ8tfkbbe4ehbg7umyUT1zhKZeMntTOjthIkV_iF0yr4ecFpOE" alt="">
  </div>
  <!-- Controles propios -->
  <div id="controls">
    <!-- Volumen -->
    <button class="ctrl-btn" onclick="toggleMute()" id="btnMute">🔊</button>
    <input type="range" class="ctrl-slider" id="volSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
    <!-- Brillo -->
    <span class="ctrl-label">☀️</span>
    <input type="range" class="ctrl-slider" id="brightSlider" min="0.2" max="1" step="0.05" value="1" oninput="setBrightness(this.value)">
    <!-- Aspecto -->
    <button class="ctrl-btn" onclick="cycleAspect()" id="btnAspect" title="Aspecto">⊡</button>
    <!-- Fullscreen -->
    <button class="ctrl-btn" id="btnFS" onclick="goFullscreen()">⤢</button>
  </div>
</div>

<div class="subcats" id="subcats"></div>
<div class="list" id="list"></div>

</div>
<script>
const CANALES_URL = 'https://raw.githubusercontent.com/chocopopflow/app/main/canales.json';
let channels = {};

const cats = Object.keys(channels);
let activeCat = cats[0];
let aspectModes = ['cover','contain','fill'];
let aspectIdx = 0;
let controlsTimer;

/* ---- RENDER ---- */
function renderCats() {
  const subcats = document.getElementById('subcats');
  subcats.innerHTML = '';
  cats.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'subcat' + (cat === activeCat ? ' active' : '');
    div.textContent = cat;
    div.onclick = () => { activeCat = cat; renderCats(); renderList(); };
    subcats.appendChild(div);
  });
}

function renderList() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  list.scrollTop = 0;
  channels[activeCat].forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'item';
    const logoEl = ch.logo
      ? `<img class="logoCh" src="${ch.logo}" onerror="this.style.display='none';this.nextSibling.style.display='block'" alt="">`
      : '';
    const ph = `<div class="logoCh-placeholder" style="${ch.logo ? 'display:none' : ''}"></div>`;
    item.innerHTML = `
      <div class="num">${String(i+1).padStart(3,'0')}</div>
      ${logoEl}${ph}
      <div><div class="name">${ch.name}</div></div>`;
    item.setAttribute('data-url', ch.url);
    item.onclick = () => play(item, ch.url);
    list.appendChild(item);
  });
}

/* ---- SEARCH ---- */
function toggleSearch() {
  const s = document.getElementById('search');
  s.style.display = s.style.display === 'none' ? 'block' : 'none';
}
document.getElementById('search').addEventListener('input', function() {
  const val = this.value.toLowerCase().trim();
  if (val === '') {
    // Sin búsqueda: volver a la categoría activa normal
    renderList();
    return;
  }
  // Buscar en TODOS los canales de TODAS las categorías
  const list = document.getElementById('list');
  list.innerHTML = '';
  list.scrollTop = 0;
  Object.values(channels).forEach(cat => {
    cat.forEach((ch, i) => {
      if (ch.name.toLowerCase().includes(val)) {
        const item = document.createElement('div');
        item.className = 'item';
        const logoEl = ch.logo
          ? `<img class="logoCh" src="${ch.logo}" onerror="this.style.display='none';this.nextSibling.style.display='block'" alt="">`
          : '';
        const ph = `<div class="logoCh-placeholder" style="${ch.logo ? 'display:none' : ''}"></div>`;
        item.innerHTML = `
          <div class="num">—</div>
          ${logoEl}${ph}
          <div><div class="name">${ch.name}</div></div>`;
        item.setAttribute('data-url', ch.url);
        item.onclick = () => play(item, ch.url);
        list.appendChild(item);
      }
    });
  });
});

/* ---- PLAY ---- */
function play(el, url) {
  document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  const v = document.getElementById('video');
  const ph = document.getElementById('playerPlaceholder');
  // Mostrar placeholder mientras carga (tapa el frame negro del browser)
  ph.classList.remove('hidden');
  v.src = url;
  v.load();
  // Ocultar placeholder recién cuando el video efectivamente reproduce
  v.onplaying = () => { ph.classList.add('hidden'); };
  v.play().catch(()=>{});
  // Guardar último canal visto
  try { localStorage.setItem('lastUrl', url); localStorage.setItem('lastItem', el.querySelector('.name').textContent); } catch(e){}
}

/* ---- CONTROLES ---- */
// Mostrar controles al tocar el player
const wrap = document.getElementById('playerWrap');
wrap.addEventListener('touchstart', () => {
  wrap.classList.add('showControls');
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => wrap.classList.remove('showControls'), 3000);
});

// Volumen
function setVolume(val) {
  const v = document.getElementById('video');
  v.volume = val;
  v.muted = (val == 0);
  document.getElementById('btnMute').textContent = val == 0 ? '🔇' : '🔊';
}
function toggleMute() {
  const v = document.getElementById('video');
  v.muted = !v.muted;
  document.getElementById('btnMute').textContent = v.muted ? '🔇' : '🔊';
  document.getElementById('volSlider').value = v.muted ? 0 : v.volume;
}

// Brillo (filtro CSS sobre el video)
function setBrightness(val) {
  document.getElementById('video').style.filter = `brightness(${val})`;
}

// Aspecto
const aspectIcons = ['⊡','⊞','⊟'];
const aspectLabels = ['Cover','Contain','Fill'];
function cycleAspect() {
  aspectIdx = (aspectIdx + 1) % aspectModes.length;
  document.getElementById('video').style.objectFit = aspectModes[aspectIdx];
  document.getElementById('btnAspect').title = aspectLabels[aspectIdx];
  document.getElementById('btnAspect').textContent = aspectIcons[aspectIdx];
  showToast(aspectLabels[aspectIdx]);
}

// Toast feedback
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.7);color:#fff;padding:8px 18px;border-radius:8px;font-size:14px;z-index:999;pointer-events:none;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 1200);
}

/* ---- FULLSCREEN + ROTACIÓN ---- */
function goFullscreen() {
  const v = document.getElementById('video');
  // En iOS Safari el video tiene webkitEnterFullscreen
  if (v.webkitEnterFullscreen) {
    v.webkitEnterFullscreen();
  } else if (v.requestFullscreen) {
    v.requestFullscreen().then(() => lockLandscape()).catch(()=>{});
  } else if (v.webkitRequestFullscreen) {
    v.webkitRequestFullscreen();
    lockLandscape();
  }
}

function lockLandscape() {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(()=>{});
  }
}

// Doble tap = fullscreen
let lastTap = 0;
wrap.addEventListener('touchend', function(e) {
  const now = Date.now();
  if (now - lastTap < 300) {
    e.preventDefault();
    goFullscreen();
  }
  lastTap = now;
});

// Al salir del fullscreen volver a portrait
['fullscreenchange','webkitfullscreenchange'].forEach(ev => {
  document.addEventListener(ev, () => {
    const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if (!isFS && screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait').catch(()=>{});
    }
  });
});

function init() {
  renderCats();
  renderList();
  // Intentar reproducir el último canal visto
  let lastUrl = null;
  try { lastUrl = localStorage.getItem('lastUrl'); } catch(e){}
  if (lastUrl) {
    // Buscar el item correspondiente en la lista actual
    const items = document.querySelectorAll('.item');
    let found = false;
    items.forEach(item => {
      if (!found && item.getAttribute('data-url') === lastUrl) {
        item.click();
        found = true;
      }
    });
    if (!found) {
      // Reproducir directo aunque no esté en la categoría actual
      const ph = document.getElementById('playerPlaceholder');
      const v = document.getElementById('video');
      ph.classList.remove('hidden');
      v.src = lastUrl;
      v.load();
      v.onplaying = () => { ph.classList.add('hidden'); };
      v.play().catch(()=>{});
    }
  } else {
    // Sin historial: reproducir Telefe por defecto
    const telefeUrl = 'http://190.104.226.30/Live/870787012c00961adaf9b2304d704b57/telefe_720.m3u8';
    const ph = document.getElementById('playerPlaceholder');
    const v = document.getElementById('video');
    ph.classList.remove('hidden');
    v.src = telefeUrl;
    v.load();
    v.onplaying = () => { ph.classList.add('hidden'); };
    v.play().catch(()=>{});
    // Marcar Telefe como activo en la lista
    const items = document.querySelectorAll('.item');
    if (items.length > 0) items[0].classList.add('active');
  }
}

// Cargar canales desde GitHub y luego iniciar
fetch(CANALES_URL)
  .then(r => r.json())
  .then(data => {
    data.categorias.forEach(cat => {
      channels[cat.nombre] = cat.canales.map(c => ({
        name: c.nombre, logo: c.logo, url: c.url
      }));
    });
    init();
  })
  .catch(err => {
    console.error('Error cargando canales:', err);
    document.getElementById('list').innerHTML = '<p style="color:#ff3535;padding:20px;text-align:center">Error al cargar canales.<br>Verificá tu conexión.</p>';
  });
</script>
</body>
</html>
